<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TikTok LIVE バトルアイテム所持数メモ</title>
  <style>
    :root {
      --bg-1: #120724;
      --bg-2: #261048;
      --card: rgba(255, 255, 255, 0.1);
      --card-strong: rgba(255, 255, 255, 0.16);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.68);
      --pink: #ff4fd8;
      --cyan: #27f5ff;
      --danger: #ff5e7a;
      --line: rgba(255, 255, 255, 0.18);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.32);
      --radius: 22px;
      --tap: 48px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 0%, rgba(255, 79, 216, 0.32), transparent 32%),
        radial-gradient(circle at 92% 8%, rgba(39, 245, 255, 0.28), transparent 28%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2) 55%, #090512);
      padding: max(16px, env(safe-area-inset-top)) 14px max(24px, env(safe-area-inset-bottom));
    }

    .app {
      width: min(980px, 100%);
      margin: 0 auto;
    }

    header {
      padding: 20px 8px 14px;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.03em;
    }

    h1 {
      margin: 12px 0 8px;
      font-size: clamp(28px, 7vw, 52px);
      line-height: 1.04;
      letter-spacing: -0.04em;
      text-shadow: 0 0 24px rgba(255, 79, 216, 0.42);
    }

    .lead {
      margin: 0 auto;
      max-width: 640px;
      color: var(--muted);
      font-weight: 650;
      line-height: 1.55;
      font-size: 14px;
    }

    .panel {
      position: sticky;
      top: 8px;
      z-index: 5;
      display: grid;
      gap: 10px;
      margin: 14px 0 18px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(16, 8, 32, 0.82);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .add-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 9px;
    }

    input[type="text"] {
      width: 100%;
      min-height: var(--tap);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 0 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.1);
      font-size: 16px;
      font-weight: 750;
      outline: none;
    }

    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.45);
    }

    input[type="text"]:focus {
      border-color: rgba(39, 245, 255, 0.75);
      box-shadow: 0 0 0 4px rgba(39, 245, 255, 0.12);
    }

    button {
      min-height: var(--tap);
      border: 0;
      border-radius: 16px;
      color: var(--text);
      background: var(--card-strong);
      font-weight: 900;
      font-size: 15px;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      transition: transform 0.08s ease, filter 0.15s ease, background 0.15s ease;
      font-family: inherit;
    }

    button:active {
      transform: scale(0.96);
      filter: brightness(1.18);
    }

    button:disabled {
      opacity: 0.36;
      cursor: not-allowed;
      filter: grayscale(0.35);
      box-shadow: none;
    }

    button:disabled:active {
      transform: none;
      filter: grayscale(0.35);
    }

    .btn-primary {
      padding: 0 18px;
      background: linear-gradient(135deg, var(--pink), #8a5cff 55%, var(--cyan));
      box-shadow: 0 10px 25px rgba(255, 79, 216, 0.22);
      white-space: nowrap;
    }

    .mini-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .mini-actions button {
      min-height: 42px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
    }

    .people {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 14px;
    }

    .person-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.075));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .person-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 9px;
      align-items: stretch;
      padding: 10px 10px 6px;
    }

    .name-open {
      min-width: 0;
      min-height: 52px;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      text-align: left;
      display: grid;
      align-content: center;
      gap: 2px;
    }

    .name-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 19px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .name-hint {
      color: rgba(255, 255, 255, 0.58);
      font-size: 11px;
      font-weight: 800;
    }

    .delete-btn {
      width: 52px;
      min-width: 52px;
      min-height: 52px;
      background: rgba(255, 94, 122, 0.18);
      color: #ffdce4;
      border: 1px solid rgba(255, 94, 122, 0.35);
      font-size: 20px;
    }

    .summary-items {
      padding: 6px 10px 10px;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 3px;
    }

    .summary-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1px;
      min-height: 32px;
      padding: 3px 1px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(0, 0, 0, 0.16);
    }

    .summary-item.is-active {
      border-color: rgba(39, 245, 255, 0.45);
      background: rgba(39, 245, 255, 0.12);
      box-shadow: inset 0 0 18px rgba(39, 245, 255, 0.08);
    }

    .icon {
      display: grid;
      place-items: center;
      min-width: 18px;
      height: 19px;
      border-radius: 7px;
      font-size: 12px;
      line-height: 1;
      background: rgba(255, 255, 255, 0.13);
      box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.08);
    }

    .gold-glove {
      background: linear-gradient(135deg, rgba(255, 230, 120, 0.34), rgba(255, 181, 38, 0.24));
      box-shadow:
        inset 0 0 12px rgba(255, 255, 255, 0.28),
        0 0 12px rgba(255, 205, 54, 0.36);
    }

    .gold-glove .emoji-gold {
      display: inline-block;
      filter: sepia(1) saturate(5.2) hue-rotate(346deg) brightness(1.24) contrast(1.08) drop-shadow(0 0 4px rgba(255, 222, 82, 0.75));
      transform: translateZ(0);
    }

    .count {
      display: grid;
      place-items: center;
      min-width: 12px;
      min-height: 19px;
      font-size: 14px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.06em;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 170px;
      border: 1px dashed rgba(255, 255, 255, 0.22);
      border-radius: 24px;
      color: var(--muted);
      text-align: center;
      font-weight: 800;
      line-height: 1.7;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
    }

    .footer-note {
      margin: 18px 4px 0;
      color: rgba(255, 255, 255, 0.55);
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.6;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: max(16px, env(safe-area-inset-top)) 12px max(16px, env(safe-area-inset-bottom));
    }

    .modal[hidden] {
      display: none;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(3, 1, 12, 0.68);
      backdrop-filter: blur(8px);
    }

    .modal-sheet {
      position: relative;
      width: min(620px, 100%);
      max-height: min(78vh, 760px);
      overflow: auto;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 28px;
      background:
        radial-gradient(circle at 0% 0%, rgba(255, 79, 216, 0.24), transparent 28%),
        radial-gradient(circle at 100% 0%, rgba(39, 245, 255, 0.2), transparent 30%),
        rgba(24, 12, 42, 0.96);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.58);
      padding: 14px;
    }

    .modal-head {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .modal-kicker {
      margin: 0 0 5px;
      color: rgba(255, 255, 255, 0.62);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .modal-title {
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: clamp(22px, 6vw, 34px);
      font-weight: 950;
      line-height: 1.1;
      letter-spacing: -0.04em;
    }

    .modal-close {
      width: 50px;
      min-width: 50px;
      min-height: 50px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.11);
      font-size: 22px;
    }

    .modal-items {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .modal-item-card {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
    }

    .modal-item-display {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 7px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.16);
    }

    .modal-icon {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      font-size: 22px;
      background: rgba(255, 255, 255, 0.13);
    }

    .modal-icon.gold-glove {
      background: linear-gradient(135deg, rgba(255, 230, 120, 0.36), rgba(255, 181, 38, 0.26));
      box-shadow:
        inset 0 0 18px rgba(255, 255, 255, 0.3),
        0 0 18px rgba(255, 205, 54, 0.42);
    }

    .modal-label {
      min-width: 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 12px;
      font-weight: 900;
      line-height: 1.2;
    }

    .modal-count {
      min-width: 30px;
      text-align: right;
      font-size: 25px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.06em;
    }

    .modal-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .count-btn {
      width: 100%;
      min-width: 0;
      min-height: 42px;
      padding: 0;
      font-size: 24px;
      line-height: 1;
      border: 1px solid var(--line);
      border-radius: 13px;
    }

    .minus {
      color: #ffd9e0;
      background: rgba(255, 94, 122, 0.18);
    }

    .plus {
      color: #dfffff;
      background: rgba(39, 245, 255, 0.16);
    }

    @media (max-width: 420px) {
      body { padding-left: 8px; padding-right: 8px; }
      .panel { top: 4px; border-radius: 20px; gap: 8px; padding: 10px; }
      .add-row {
        grid-template-columns: minmax(0, 1fr) minmax(104px, 0.56fr);
        gap: 6px;
      }
      input[type="text"] {
        min-height: 42px;
        border-radius: 14px;
        padding: 0 10px;
        font-size: 14px;
      }
      .btn-primary {
        min-height: 42px;
        border-radius: 14px;
        padding: 0 8px;
        font-size: 13px;
      }
      .mini-actions { gap: 6px; }
      .mini-actions button {
        min-height: 40px;
        border-radius: 14px;
        font-size: 12px;
      }
      .people { grid-template-columns: 1fr; gap: 10px; }
      .person-card { border-radius: 22px; }
      .person-top { padding: 8px 8px 4px; gap: 6px; }
      .name-open { min-height: 46px; border-radius: 14px; padding: 6px 10px; }
      .name-text { font-size: 17px; }
      .name-hint { font-size: 10px; }
      .delete-btn { width: 46px; min-width: 46px; min-height: 46px; border-radius: 14px; }
      .summary-items { grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 3px; padding: 4px 8px 8px; }
      .summary-item { min-height: 28px; border-radius: 10px; gap: 1px; padding: 2px 1px; }
      .icon { min-width: 16px; height: 17px; font-size: 11px; border-radius: 6px; }
      .count { min-width: 11px; min-height: 17px; font-size: 13px; }
      .modal { padding-left: 8px; padding-right: 8px; }
      .modal-sheet { border-radius: 24px; padding: 10px; max-height: 82vh; }
      .modal-head { gap: 7px; margin-bottom: 9px; }
      .modal-close { width: 44px; min-width: 44px; min-height: 44px; border-radius: 14px; }
      .modal-items { gap: 7px; }
      .modal-item-card { padding: 7px; border-radius: 16px; gap: 7px; }
      .modal-item-display { grid-template-columns: auto 1fr auto; gap: 5px; min-height: 37px; padding: 5px; border-radius: 12px; }
      .modal-icon { width: 31px; height: 31px; font-size: 18px; border-radius: 10px; }
      .modal-label { font-size: 10px; }
      .modal-count { min-width: 22px; font-size: 21px; }
      .count-btn { min-height: 38px; border-radius: 12px; font-size: 22px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="badge">TikTok LIVE Battle Memo</div>
      <h1>バトルアイテム<br>所持数メモ</h1>
      <p class="lead">名前の下はアイコンと数字だけ表示。名前をタップすると、中央ポップアップでアイテムを＋/−できます。</p>
    </header>

    <section class="panel" aria-label="操作パネル">
      <form class="add-row" id="addForm">
        <input id="newName" type="text" placeholder="名前を入力（例：なつみ）" autocomplete="off" />
        <button class="btn-primary" id="addBtn" type="submit" disabled>＋ 人を追加</button>
      </form>
      <div class="mini-actions">
        <button type="button" id="resetCountsBtn">🔄 個数だけ0</button>
        <button type="button" id="clearBtn">🗑 全削除</button>
      </div>
    </section>

    <section class="people" id="people"></section>

    <p class="footer-note">保存先：ブラウザのlocalStorage。同じ端末・同じブラウザで開くと前回の続きから使えます。</p>
  </main>

  <div class="modal" id="itemModal" hidden>
    <div class="modal-backdrop" data-action="close-modal"></div>
    <section class="modal-sheet" role="dialog" aria-modal="true" aria-label="アイテム編集">
      <div class="modal-head">
        <div>
          <p class="modal-kicker">ITEM EDIT</p>
          <p class="modal-title" id="modalTitle">名前未入力</p>
        </div>
        <button class="modal-close" type="button" id="modalClose" aria-label="閉じる">×</button>
      </div>
      <div class="modal-items" id="modalItems"></div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "tiktok-battle-items-counter-v2";
    const OLD_STORAGE_KEY = "tiktok-battle-items-counter-v1";

    const ITEMS = [
      { key: "glove", name: "グローブ", icon: "🥊" },
      { key: "secretGlove", name: "シークレットグローブ", icon: "🥊", variant: "gold" },
      { key: "booster2", name: "2位ブースター", icon: "⚡2" },
      { key: "booster3", name: "3位ブースター", icon: "⚡3" },
      { key: "mist", name: "ミスト", icon: "☁" },
      { key: "timer", name: "タイマー", icon: "⏱" },
      { key: "hammer", name: "ハンマー", icon: "🔨" }
    ];

    const els = {
      form: document.getElementById("addForm"),
      newName: document.getElementById("newName"),
      addBtn: document.getElementById("addBtn"),
      people: document.getElementById("people"),
      resetCountsBtn: document.getElementById("resetCountsBtn"),
      clearBtn: document.getElementById("clearBtn"),
      modal: document.getElementById("itemModal"),
      modalTitle: document.getElementById("modalTitle"),
      modalItems: document.getElementById("modalItems"),
      modalClose: document.getElementById("modalClose")
    };

    let state = loadState();
    let activePersonId = null;

    function createEmptyCounts() {
      return Object.fromEntries(ITEMS.map(item => [item.key, 0]));
    }

    function makePerson(name = "") {
      return {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
        name,
        counts: createEmptyCounts()
      };
    }

    function normalizePeople(saved) {
      if (!Array.isArray(saved)) return null;
      return saved.map(person => ({
        id: person.id || String(Date.now() + Math.random()),
        name: person.name || "",
        counts: { ...createEmptyCounts(), ...(person.counts || {}) }
      }));
    }

    function loadState() {
      try {
        const saved = normalizePeople(JSON.parse(localStorage.getItem(STORAGE_KEY)));
        if (saved) return saved;

        const oldSaved = normalizePeople(JSON.parse(localStorage.getItem(OLD_STORAGE_KEY)));
        if (oldSaved) return oldSaved;
      } catch (error) {
        console.warn("保存データの読み込みに失敗しました", error);
      }
      return [];
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getPersonById(id) {
      return state.find(person => person.id === id);
    }

    function iconClass(item) {
      return item.variant === "gold" ? "gold-glove" : "";
    }

    function iconContent(item) {
      return item.variant === "gold" ? `<span class="emoji-gold">${item.icon}</span>` : item.icon;
    }

    function renderPeople() {
      saveState();

      if (state.length === 0) {
        els.people.innerHTML = `
          <div class="empty">
            <div>
              まだ名前がありません。<br>
              上の入力欄から追加してください。
            </div>
          </div>
        `;
        return;
      }

      els.people.innerHTML = state.map(person => `
        <article class="person-card" data-id="${person.id}">
          <div class="person-top">
            <button class="name-open" type="button" data-action="open-modal" aria-label="${escapeHtml(person.name || "名前未入力")}のアイテムを編集">
              <span class="name-text">${escapeHtml(person.name || "名前未入力")}</span>
              <span class="name-hint">タップでアイテム編集</span>
            </button>
            <button class="delete-btn" type="button" data-action="delete" aria-label="この人を削除">×</button>
          </div>
          <div class="summary-items" aria-label="所持アイテム一覧">
            ${ITEMS.map(item => {
              const count = Number(person.counts[item.key] || 0);
              return `
                <div class="summary-item ${count > 0 ? "is-active" : ""}" title="${item.name}">
                  <span class="icon ${iconClass(item)}" aria-hidden="true">${iconContent(item)}</span>
                  <span class="count">${count}</span>
                </div>
              `;
            }).join("")}
          </div>
        </article>
      `).join("");
    }

    function renderModal() {
      const person = getPersonById(activePersonId);
      if (!person) {
        closeModal();
        return;
      }

      els.modalTitle.textContent = person.name || "名前未入力";
      els.modalItems.innerHTML = ITEMS.map(item => {
        const count = Number(person.counts[item.key] || 0);
        return `
          <div class="modal-item-card">
            <div class="modal-item-display">
              <span class="modal-icon ${iconClass(item)}" aria-hidden="true">${iconContent(item)}</span>
              <span class="modal-label">${item.name}</span>
              <span class="modal-count" aria-live="polite">${count}</span>
            </div>
            <div class="modal-controls">
              <button class="count-btn minus" type="button" data-action="minus" data-item="${item.key}" aria-label="${item.name}を減らす">−</button>
              <button class="count-btn plus" type="button" data-action="plus" data-item="${item.key}" aria-label="${item.name}を増やす">＋</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function openModal(personId) {
      activePersonId = personId;
      renderModal();
      els.modal.hidden = false;
      document.body.style.overflow = "hidden";
      setTimeout(() => els.modalClose.focus(), 0);
    }

    function closeModal() {
      activePersonId = null;
      els.modal.hidden = true;
      document.body.style.overflow = "";
    }

    function updateAddButton() {
      els.addBtn.disabled = els.newName.value.trim().length === 0;
    }

    els.newName.addEventListener("input", updateAddButton);

    els.form.addEventListener("submit", event => {
      event.preventDefault();
      const name = els.newName.value.trim();
      if (!name) {
        updateAddButton();
        els.newName.focus();
        return;
      }
      const newPerson = makePerson(name);
      state.push(newPerson);
      els.newName.value = "";
      updateAddButton();
      renderPeople();
      openModal(newPerson.id);
    });

    els.people.addEventListener("click", event => {
      const card = event.target.closest(".person-card");
      if (!card) return;

      const person = getPersonById(card.dataset.id);
      if (!person) return;

      const button = event.target.closest("button");
      if (!button) return;

      const action = button.dataset.action;

      if (action === "open-modal") {
        openModal(person.id);
        return;
      }

      if (action === "delete") {
        const displayName = person.name || "この人";
        if (confirm(`${displayName}を削除しますか？`)) {
          state = state.filter(p => p.id !== person.id);
          if (activePersonId === person.id) closeModal();
          renderPeople();
        }
      }
    });

    els.modalItems.addEventListener("click", event => {
      const button = event.target.closest("button");
      if (!button) return;

      const person = getPersonById(activePersonId);
      if (!person) return;

      const action = button.dataset.action;
      const itemKey = button.dataset.item;
      if (action !== "plus" && action !== "minus") return;

      const current = Number(person.counts[itemKey] || 0);
      person.counts[itemKey] = action === "plus" ? current + 1 : Math.max(0, current - 1);
      saveState();
      renderPeople();
      renderModal();
    });


    els.modal.addEventListener("click", event => {
      if (event.target.dataset.action === "close-modal") closeModal();
    });

    els.modalClose.addEventListener("click", closeModal);

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && !els.modal.hidden) closeModal();
    });

    els.resetCountsBtn.addEventListener("click", () => {
      if (!state.length) return;
      if (confirm("全員の個数だけ0に戻しますか？名前は残ります。")) {
        state = state.map(person => ({ ...person, counts: createEmptyCounts() }));
        renderPeople();
        if (!els.modal.hidden) renderModal();
      }
    });

    els.clearBtn.addEventListener("click", () => {
      if (confirm("名前と個数をすべて削除しますか？")) {
        state = [];
        closeModal();
        renderPeople();
      }
    });

    updateAddButton();
    renderPeople();
  </script>
</body>
</html>
